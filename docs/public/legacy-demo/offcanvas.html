<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoDialog Offcanvas Demo</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/sodialog@0.3.6/dist/sodialog.css">

  <body>
    <main class="demo-page">
      <section class="card">
        <h2>Offcanvas 位置演示</h2>
        <p>点击按钮测试 start、end、top、bottom 四个方向。</p>
        <div class="button-row">
          <button type="button" data-placement="start" disabled>Start</button>
          <button type="button" data-placement="end" disabled>End</button>
          <button type="button" data-placement="top" disabled>Top</button>
          <button type="button" data-placement="bottom" disabled>Bottom</button>
        </div>

      </section>
