name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NPM_AUTOMATION_TOKEN: ${{ secrets.NPM_AUTOMATION_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Validate tag and package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p 'require("./package.json").version')"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check if version already exists on npm
        id: version_check
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p 'require("./package.json").name')"
          PACKAGE_VERSION="$(node -p 'require("./package.json").version')"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "Version ${PACKAGE_NAME}@${PACKAGE_VERSION} already published, skipping."
            echo "skip_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (Granular Access Token)
        if: steps.version_check.outputs.skip_publish == 'false' && env.NPM_AUTOMATION_TOKEN != ''
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_AUTOMATION_TOKEN }}

      - name: Publish to npm (Trusted Publishing fallback)
        if: steps.version_check.outputs.skip_publish == 'false' && env.NPM_AUTOMATION_TOKEN == ''
        run: npm publish --access public --provenance
