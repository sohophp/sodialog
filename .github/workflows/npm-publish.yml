name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (for example v0.2.5)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NPM_AUTOMATION_TOKEN: ${{ secrets.NPM_AUTOMATION_TOKEN }}
      TAG_VERSION: ${{ inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Update npm for trusted publishing
        run: npm install --global npm@latest

      - name: Validate tag and package version
        run: npm run release:check

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Release verify (lint + build + docs smoke)
        run: npm run release:verify

      - name: Upload docs smoke report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-smoke-report-npm-publish
          path: playwright-report/docs-smoke
          if-no-files-found: ignore

      - name: Check if version already exists on npm
        id: version_check
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p 'require("./package.json").name')"
          PACKAGE_VERSION="$(node -p 'require("./package.json").version')"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "Version ${PACKAGE_NAME}@${PACKAGE_VERSION} already published, skipping."
            echo "skip_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (Granular Access Token)
        id: token_publish
        if: steps.version_check.outputs.skip_publish == 'false' && env.NPM_AUTOMATION_TOKEN != '' && github.event_name != 'workflow_dispatch'
        continue-on-error: true
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_AUTOMATION_TOKEN }}

      - name: Publish to npm (Trusted Publishing fallback)
        if: steps.version_check.outputs.skip_publish == 'false' && (github.event_name == 'workflow_dispatch' || env.NPM_AUTOMATION_TOKEN == '' || steps.token_publish.outcome == 'failure')
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
