<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoDialog Offcanvas Basic Demo</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f6f8fb;
      }
      .card {
        max-width: 720px;
        background: #fff;
        border: 1px solid #d8e0ef;
        border-radius: 14px;
        padding: 20px;
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      button {
        border: 0;
        border-radius: 10px;
        background: #0d9488;
        color: #fff;
        padding: 10px 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Offcanvas 位置演示</h2>
      <p>点击按钮打开不同方向的 Offcanvas。</p>
      <p id="status" style="margin-top: 10px; color: #475569; font-size: 13px">正在加载示例脚本...</p>
      <div class="row">
        <button data-placement="start" disabled>Start</button>
        <button data-placement="end" disabled>End</button>
        <button data-placement="top" disabled>Top</button>
        <button data-placement="bottom" disabled>Bottom</button>
      </div>
    </div>

    <script type="module">
      const defaultVersion = '0.3.6'
      const versionPattern = /^(latest|\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$/
      const requestedVersion =
        new URLSearchParams(window.location.search).get('sodialogVersion') ||
        new URLSearchParams(window.location.search).get('cdnVersion') ||
        new URLSearchParams(window.location.search).get('version') ||
        defaultVersion
      const version = versionPattern.test(requestedVersion) ? requestedVersion : defaultVersion
      const packagePath = `sodialog@${version}/dist`
      const styleLink = document.createElement('link')
      styleLink.rel = 'stylesheet'
      styleLink.href = `https://cdn.jsdelivr.net/npm/${packagePath}/sodialog.css`
      styleLink.addEventListener('error', () => {
        const fallbackHref = `https://unpkg.com/${packagePath}/sodialog.css`
        if (styleLink.href !== fallbackHref) {
          styleLink.href = fallbackHref
        }
      })
      document.head.append(styleLink)

      const status = document.querySelector('#status')
      const buttons = document.querySelectorAll('button[data-placement]')
      const candidates = [
        `https://cdn.jsdelivr.net/npm/${packagePath}/sodialog.es.js`,
        `https://unpkg.com/${packagePath}/sodialog.es.js`,
      ]

      const loadApi = async () => {
        for (const url of candidates) {
          try {
            return await import(url)
          } catch {
            // Try next CDN endpoint.
          }
        }
        return null
      }

      const api = await loadApi()
      if (!api?.openOffcanvas) {
        if (status) {
          status.textContent = '加载失败：无法访问示例依赖，请检查网络或代理。'
          status.style.color = '#b91c1c'
        }
      } else {
        buttons.forEach((button) => {
          button.disabled = false
          button.addEventListener('click', () => {
            const placement = button.getAttribute('data-placement') || 'end'
            api.openOffcanvas({
              title: `Offcanvas ${placement}`,
              placement,
              animation: placement === 'top' || placement === 'bottom' ? 'fade' : 'slide',
              content: `<p>当前位置: ${placement}</p>`,
            })
          })
        })
        if (status) {
          status.textContent = '已就绪，点击按钮查看效果。'
          status.style.color = '#0f766e'
        }
      }
    </script>
  </body>
</html>
